"model":
    "huihui_ai/deepseek-r1-abliterated:14b"
"params":
    "check":
        - "你不需要检查后续文本内容关于扫雷的规则内容是否正确 你只需要检查是不是描述扫雷规则的文本即可"
        - "检查完毕后需要返回(带双引号的True/双引号的False)"
        - "例: \"True\", 后续文本是一个关于扫雷规则的描述 \"False\", 后续文本不是一个关于扫雷规则的描述"
    "init_examp_":
        - "在下一轮对话中用户可能会描述一段布局信息 如果存在请根据格式返回一个三维列表 如果不存在请返回\"[]\""
        - "返回内容需要使用英文双引号包括起来 输出内部请不要包含双引号"
        - "需要包含True/False,线索的位置信息的元组,是否为合法示例,格式化的线索对象"
        - "其中True代表为是雷, False代表为非雷 如果线索对象是非法的则返回False否则返回True"
        - "值得注意的是你的首要任务是接受信息并输出布局信息 如果用户没有提供该布局是否合法你才需要分析"
        - "例（这只是个示例 请不要输出这个）: \"[[[[True, False, True], [True, False, False], [False, False, False]], (1, 1), '3', True], ...]\"（这只是个示例 请不要输出这个）"
        - "（这只是个示例的解释 请不要输出这个）列表的第一个为: 线索3在索引为(1,1)的位置且这个是一个合法示例 注意用户给出的示例不一定为3*3的内容（这只是个示例解释 请不要输出这个）"
        - "后续应该会包含一段布局的示例 如果后续不存在关于布局的描述则返回\"[]\" 如果后续存在雷布局的描述请按照上述的格式输出"
    "init_examp":
            - "【智能解析指令】v2.1"
            - "◆ 输入处理流程："
            - "1. 符号转换层："
            - "   - 自动转换标记 → 'F'=True（雷）, '?'=False（安全）"
            - "   - 支持混合输入（如示例中的符号与布尔值共存）"
            - "2. 矩阵校验阶段："
            - "   ● 维度检查 → 确认坐标(x,y)在矩阵范围内"
            - "   ● 雷区校验 → 排除全True/全False异常布局"
            - "   ● 线索验证 → 计算周围8格雷数（含边缘自动缩进）"
            - "3. 结构化输出："
            - "    [["
            - "    [ [ bool,... ],... ],  # 转换后的布尔矩阵"
            - "    (x,y),         # 从0开始的坐标"
            - "    str,                 # 线索标识（保持原始输入）"
            - "    bool,    # 用户显式声明时优先若没有则自动校验结果 "
            - "    ],..."
            - "    ]"
            - "    "
            - "    【容错机制】"
            - "    当检测到以下情况时自动修正："
            - "    ✓ 坐标越界 → 自动修正到最近有效位置并标记is_valid=False"
            - "    ✓ 符号冲突 → 按优先级处理：True > 'F' > '?' > False"
            - "    ✓ 线索矛盾 → 当自动计算雷数与线索数差异≥2时，触发二次校验"
            - "    "
            - "    【动态示例】"
            - "    ▶ 用户输入：F F ?\\nF 5 ?\\nF ? ?"
            - "    → 转换矩阵：["
            - "  [ True, True, False ],"
            - "  [ True, False, False ],  # 原'5'位置转为False"
            - "  [ True, False, False ]"
            - "]"
            - "→ 坐标(1,1)周围雷数计算："
            - "- 有效相邻格：8格（自动处理边缘）"
            - "- 实际雷数：5（包含自身转换后的False）"
            - "→ 输出is_valid.system_check=False（5≠线索值5？矛盾！）"
            - "▶ 异常处理："
            - "输入 \"[[['F',0], (3,3), '5']] \""
            - "→ 转换：matrix=[[True,True]], coordinate→(0,0)（越界修正）"
            - "→ 输出is_valid.system_check=False（多重错误标记）"