- content: |
    1. 指令 "#所有规则"/"#规则列表"/"#list"/"#ls": 用来输出所有规则。
  name: "小小神中医"
  uid: "3086842243"
- content: |
    2. 指令 "#生成"/"#summon"/"#sc":
    格式: #生成 <尺寸> <规则> 
    [-t 数字] [-r] [-d 字母] [-a 数字] [-q 范围]
    
    参数说明:
    
    <尺寸>: 必填，正方形题板为单个数字(n×n)，
    长方形题板为两个数字(m n表示竖m横n)，n必须大于2
    
    <规则>: 必填，任意规则(如V，1Q 1M 1N)，
    1代规则可不加"1"，大小写不敏感
    
    -t 数字: 可选，
      为正数的时候为强制固定总雷数(修改R为指定值)
      为-1的时候表示仅使用众规则的声明来计算总雷数(不会在总雷数初始化的时候生成计算题版)
      为-2的时候表示不固定任何总雷数 全程使用软约束使总雷数尽可能的靠近规则的声明值
    
    -r: 可选，表示显示总雷数R
    
    -d 字母: 可选，表示染色规则(c=@c，r=随机染色，a=全部染色，h=随机一半染色，l=条纹染色，q=为方形染色，s=粗斜线染色，sp=蛇形染色)
    
    -a 数字: 可选，程序最大尝试次数(默认不限制)
    
    -q 范围: 可选, 指目标题板的最高线索数的范围限制 若未落在范围内会重新尝试
      -q 1-: 最高线索数至少为1
      -q -3: 最高线索数最高为3
      -q 5-9: 最高线索数是5至9
    
    说明:
    
        1. 如不指定-t参数，R会按规则自动计算
        (默认40%雷密度四舍五入，其他规则自动寻找最近的值)
        2. 含染色规则时必须指定-d参数
        3. 长方形题板至少有一边大于2
    
    可以使用"$img"来表示此次生成时回复消息时的图片URL(https://multimedia.nt.qq.com.cn/...)
    
    示例:
    #生成 5 V
    #生成 5 3 1Q 1M 1N -t 6 -r -d c -a 1000
    

  name: "小小神中医"
  uid: "3086842243"
- content: |
    3. 指令 "#查询 n [/f]"/"#cx n [/f]":
        用来查询进程n的进度，用时的后面两个数字是预计用时和预计剩余用时。
        /f表示强制输出终端末尾的10次文本输出
  name: "小小神中医"
  uid: "3086842243"
- content: |
    4. 指令 "#帮助"/"#help"/"#?": 显示当前帮助
  name: "小小神中医"
  uid: "3086842243"
- content: |
    5. 指令 "#状态"/"#state"/"##": 显示进程列表，
    包括进程数量，起始时间，尺寸，规则，调用用户。
  name: "小小神中医"
  uid: "3086842243"
- content: |
    6. 指令 "#终止 n"/"#kill n":   用来终止进程n。
  name: "小小神中医"
  uid: "3086842243"
- content: |
    7. 指令 "#查询 X/#cx X"   用来查询单个规则X
        可以使用"#cxr X"表示强制为查询规则
        加/f表示查询含有X的规则
        加/re表示启用正则表达式
        加/u表示启用区分大小写
        加/n表示仅搜索规则名称列表
        加/rand表示随机抽取其中一条直接输出 或/rand+数字"/rand2"表示随机抽取2条
        加/p+数字表示翻到第几页(每一百条消息一页从0开始索引)
        多个表达式表示同时满足才会被返回
    
    [/L],[/l]表示只搜索左线的内容
    [/M],[/m]表示只搜索中线的内容
    [/R],[/r]表示只搜索右线的内容
    [/T],[/t]表示只搜索代办规则的内容

  name: "小小神中医"
  uid: "3086842243"

- content: |
    8.可以使用"#注册规则 %name %doc"来注册至规则列表来形成代办规则
      同理可使用#reg表示该命令
      %doc留空表示删除该规则
      名称不可重复 若重复则会提示你无权修改该规则
      管理员可修改所有的代办规则
      
      可以通过回复图片的时候使用注册规则指令来进行附图
  name: "小小神中医"
  uid: "3086842243"

- content: |
    9.使用"#update"来更新当前bot的规则列表
  name: "小小神中医"
  uid: "3086842243"

- content: |
    10.使用"#pull"来拉取当前github仓库内的版本
  name: "小小神中医"
  uid: "3086842243"

-   content: |
      "#" 综合指令
      如果后面的第一个参数是数字且小于1000 那么就等效于#sc 如果参数包含/f则等效于#cx
      如果后面的第一个参数是数字且大于等于1000 那么相当于#cx
      如果后面的第一个参数是非数字字符 那么就相当于#cxr
      如果后续不存在参数 那么相当于#state
    name: "小小神中医"
    uid: "3086842243"

-   content: |
      注意事项:
      一次只能发送单个命令且必须按照格式，不能输入多余字符，
      按照格式每项之间要加一个空格，标点必须用英文标点，
      第3条的查询可以简写为cx，
      例如，你可以输入#cx n来查询进程n的进度。
      3D规则后面可加参数，3D:n，n表示层数，3D规则和其他多板规则结合时，3D:表示不额外加3D规则的层数。
      1C后面可加参数，1C:n，n为距离平方，例如：1C:4表示所有雷跳位四连通，多个距离用;隔开，距离如果有范围用:，如1C:1:4;8表示所有雷邻-角-跳-角跳十六连通。
      2G后面可加参数，2G:n;;a，n为距离平方，a为数量，例如：2G:2:3表示每个对角四连通雷区的面积是3，多个距离用;隔开，距离如果有范围用:。
      1X后面可加参数，1X:n，n为距离平方，例如1X:4表示线索表示周围四格跳位格的雷数，多个距离用;隔开，距离如果有范围用:。
    name: "小小神中医"
    uid: "3086842243"

