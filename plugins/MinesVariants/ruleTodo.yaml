- author_name: 波常未来
  author_uid: 81500378
  doc: 四连通雷区雷数为从1到n各一组
  name: '*1G^'''
  time: 1772342915
- author_name: 波常未来
  author_uid: 81500378
  doc: 线索数字表示四个视野方向（边角处线索不包括边界方向）上最长视野值减去最短视野值，线索箭头指向最长视野方向，箭尾指向最短视野方向；同一个线索格可以有多个箭头和箭尾方向
  name: 1E''
  time: 1772342915
- author_name: 波常未来
  author_uid: 81500378
  doc: 线索数字表示四个视野方向（边角处线索不包括边界方向）上除去最长方向及最短方向外的剩余方向视野之和，线索箭头指向最长视野方向，箭尾指向最短视野方向
  name: 1E'''
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 如果一个雷周围四格都是雷，则这个雷的雷值为2/0。/如果......都是非雷，则......雷值为0/2。后续测试强弱，都是雷/非雷可以改成没有非雷/雷看看是变强还是变弱。
  name: 4B/4E/4S/4H
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 离线索最近的雷对于这个线索来说雷值为2/0。
  name: 4H'/4S'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 如果一个线索的上方一格是非问号线索，则它们范围的总雷数就是线索值相加，否则线索表示周围八格雷数。
  name: 4T1
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 如果一个线索的上方一格是非问号线索，则这个线索周围八格的雷数等于两线索值相加，否则线索表示周围八格雷数。
  name: 4T'
  time: 1772342915
- author_name: 咸鱼
  author_uid: 3898637422
  doc: 线索表示四方向视野，线索的视野遇到雷会左转（同一格视野不重复计算）。
  name: 1E^
  time: 1772342915
- author_name: 咸鱼
  author_uid: 3898637422
  doc: 线索表示纵横视野之差，箭头指向更长的方向，线索的视野遇到雷会左转（同一格视野不重复计算）。
  name: 1E'^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 行失衡，即每行雷数各不相同。
  name: 3C~
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 列平衡，即每列雷数相同。
  name: 3A^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 行失衡，列平衡，即每行雷数各不相同，每列雷数相同。
  name: 3C@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的高度不低于它左边一列的最高的雷的高度。
  name: 3W
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的高度不低于它左边一列的最高的雷的高度，每一列的最低的雷的高度不低于它左边一列的最低的雷的高度。
  name: 3R
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的高度不低于它左边一列的最高的雷的高度，每一列的最低的雷的高度不高于它左边一列的最低的雷的高度。
  name: 3T'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷不能相互接触，每一列的最低的雷不能相互接触。
  name: 3R'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷不能相互接触（对角接触也不行），每一列的最低的雷不能相互接触（对角接触也不行）。
  name: 3R^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 设题板大小为n，每一列的最高的雷和最低的雷的高度差不低于n的一半。
  name: 3H
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 设题板大小为n，每一列的最高的雷和最低的雷的高度差不高于n的一半。
  name: 3C*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每列最高的雷的雷值为2。
  name: 3U
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每列最低的雷的雷值为0。
  name: 3D
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的雷与它的高度差。
  name: 3H'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的两个雷之间的高度差。
  name: 3H^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示距离它最近的雷与那个雷所在列的最高的雷的高度差。
  name: 3D'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷的高度差都被该列的字母标号代替，一个字母对应一个数字，一个数字对应一个字母，副板样式同2E。
  name: 3E'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷的高度差都被该列的字母标号代替，如果某一列X的最高的雷和最低的雷的高度差是N，则题板上X=N的格子必须是雷，主板样式同2E'。
  name: 3E^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 包含以下14个规则：[3U],[3D],[3A*],[3E*],[3E@],[3E%],[3P'],[3P^],[3M],[3M'],[3M%],[3C%],[3S^],[3S*]（风云代号：8,9,20,21,22,23,25,26,27,28,34,36,37,38）。
  name: 3#
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 包含以下6个规则：[3H'],[3H^],[3D'],[3R*],[3R@],[3M@]（风云代号：10,11,12,18,19,34）。
  name: 3#'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷的下面一格非雷，每一列的最低的雷的上面一格非雷。
  name: 3W'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示它到该列最高的雷和最低的雷的距离（顺序不确定）。
  name: 3R*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示它到该列最高的雷或最低的雷的距离。
  name: 3R@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数。
  name: 3A*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数和它与该列最低的雷中间的雷数之和。
  name: 3E*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数和它与该列最低的雷中间的雷数（顺序不确定）。
  name: 3E@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示它与该列最高的雷中间的雷数或它与该列最低的雷中间的雷数。
  name: 3E%
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每列中最高的雷和最低的雷中间的雷数（范围不包括该列最高的雷和最低的雷）被该列的字母标号代替，一个字母对应一个数字，一个数字对应一个字母，副板样式同2E。
  name: 3S'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 一个雷的周围8格（不包括自身）中如果有一列中的最高的雷，则这个雷的雷值是2。
  name: 3P'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 一个雷的雷值等于周围8格（不包括自身）中一列中的最高的雷的雷数加一。
  name: 3P^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 一个雷的周围8格（不包括自身）中如果有一列中的最低的雷，则这个雷的雷值是0。
  name: 3M
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 一个雷的雷值等于一减周围8格（不包括自身）中一列中的最低的雷的雷数。
  name: 3M'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索的周围8格的某一格是风云格，这一格的位置全盘共享，一个线索的风云格上如果有一列中的最高的雷，则这个雷对于这个线索来说雷值为2。
  name: 3T^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索的周围8格的某一格是风云格，这一格的位置全盘共享，一个线索的风云格上如果有一列中的最低的雷，则这个雷对于这个线索来说雷值为0。
  name: 3T*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷的周围8格的某一格是风云格，这一格的位置全盘共享，一个雷的风云格上如果有一列中的最高的雷，则这个雷的雷值是2。
  name: 3M^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷的周围8格的某一格是风云格，这一格的位置全盘共享，一个雷的风云格上如果有一列中的最低的雷，则这个雷的雷值是0。
  name: 3M*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷的周围四格都恰有一雷。
  name: 3N'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 雷线索表示它到该列最高的雷的高度差与它到该列最低的雷的高度差的差的绝对值。
  name: 3M@
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 一个雷的雷值等于它到该列最高的雷的高度差与它到该列最低的雷的高度差的差的绝对值。
  name: 3M%
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示周围八格中的一列中的最高的雷和一列中的最低的雷的总数。
  name: 3C%
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示周围八格中的一列中的最高的雷的雷数和一列中的最低的雷的雷数（顺序不确定）。
  name: 3S^
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 线索表示周围八格中的一列中的最高的雷的雷数或一列中的最低的雷的雷数。
  name: 3S*
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷八连通。
  name: 3B'
  time: 1772342915
- author_name: 小小神中医
  author_uid: 3086842243
  doc: 每一列的最高的雷和最低的雷各自八连通。
  name: 3B^
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 吸引 场上不存在横竖方向上的雷—空—雷
  name: αA
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 积木 每段横向雷下方相邻格中一定有雷（最下方一行除外）
  name: αB
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 六连通 所有雷在竖直方向和对角线方向上连通
  name: αC
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 对角 四连通雷区之间不能对角相邻
  name: αD
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 回车 所有雷四方向连通，特别地，某一行最右格与下一行最左格连通
  name: αE
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 下落 雷区与题板下边缘四方向连通
  name: αF
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 银河 四连通雷区为中心对称图形
  name: αG
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 空心 (1)2*2区域不能都是雷(2)雷周围四格不能都是雷
  name: αH
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 不规则 (1)所有雷八方向连通(2)任意四连通雷区不能为矩形
  name: αI
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 无JL 场上不存在J或L形四连块
  name: αJ
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 马步对偶 任意雷的马步位置上有且仅有一个雷
  name: αK
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: L形 四连通雷区为六边形
  name: αL
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 同余 四连通雷区面积除以3的余数相同
  name: αM
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 中性 每行最左和最右的雷染色情况不同，每列最上和最下同理
  name: αN
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 外部 (1)雷区与题板外部四连通(2)题板的一条边缘只能与一个雷区连通
  name: αO
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 划分 (1)四连通雷区面积为2(2)相邻两雷所在的直线上还有其他雷
  name: αP
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 独方 2*2的雷区不能与其他雷四方向相邻
  name: αQ
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 自旋 每一行不能同时存在染色非雷格、非染色非雷格、染色雷格和非染色雷格
  name: αS
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 晶胞 题板两组对边雷分布情况相同
  name: αU
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 均值 每行每列有且仅有一个线索是周围四格中所有线索的算术平均值
  name: βA
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 误差 每行误差线索数量各不相同，误差线索比真实值大1或小1
  name: βL
  time: 1772342915
- author_name: botif
  author_uid: 1643337042
  doc: 中性 每行每列有且仅有一个线索比真实值大1，一个线索比真实值小1
  name: βN
  time: 1772342915
- author_name: 介稳,
  author_uid: 3242525312
  doc: '&#91;阿米浴说的道理&#93;'
  name: <说的道理>
